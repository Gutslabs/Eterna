<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIPex Side Panel</title>
    <style>
      /* Match the sidebar panel background (PANEL_BG in sidebar-overlay.tsx)
         so opening the panel doesn't flash white while the app loads. */
      html,
      body {
        background: #181817;
      }
      /* Opened as a standalone tab (data-standalone set in index.tsx): center
         the chat as a max-width column so it reads like a normal chat page
         instead of stretching across the whole tab. The embedded sidebar
         iframe is unaffected. */
      html[data-standalone] body {
        display: flex;
        justify-content: center;
      }
      html[data-standalone] #root {
        width: 100%;
        max-width: 860px;
        height: 100vh;
      }
    </style>
    <link rel="stylesheet" href="./pages/tailwind.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./pages/sidepanel/index.tsx"></script>
  </body>
</html>
